name: Poll Waze Alerts

on:
  schedule:
    - cron: '*/10 * * * *'   # every 10 minutes
  workflow_dispatch:           # manual trigger for testing

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Waze and cache to Supabase
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          node --input-type=module << 'EOF'
          const ENDPOINTS = [
            'https://www.waze.com/live-map/api/georss?top=-37.55&bottom=-38.20&left=144.50&right=145.50&env=row&types=alerts',
            'https://www.waze.com/row-rtserver/web/TGeoRSS?tk=community&format=JSON&types=alerts&left=144.50&right=145.50&top=-37.55&bottom=-38.20&zoom=13',
          ];

          const HEADERS = {
            'User-Agent': 'Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36',
            'Accept': 'application/json, text/javascript, */*; q=0.01',
            'Accept-Language': 'en-AU,en;q=0.9',
            'Referer': 'https://www.waze.com/en-GB/live-map',
            'Origin': 'https://www.waze.com',
            'X-Requested-With': 'XMLHttpRequest',
          };

          let alerts = null;
          for (const url of ENDPOINTS) {
            try {
              const res = await fetch(url, { headers: HEADERS, signal: AbortSignal.timeout(10000) });
              if (!res.ok) { console.log(`${res.status} — ${url.split('?')[0]}`); continue; }
              const data = await res.json();
              alerts = data?.alerts ?? data?.data?.alerts ?? [];
              console.log(`✓ ${alerts.length} alerts from ${url.split('?')[0]}`);
              break;
            } catch (e) {
              console.log(`Error: ${e.message}`);
            }
          }

          if (!alerts) {
            console.log('All Waze endpoints failed — still blocked from GitHub runner IPs');
            process.exit(1);
          }

          const res = await fetch(`${process.env.SUPABASE_URL}/rest/v1/waze_cache`, {
            method: 'POST',
            headers: {
              'apikey': process.env.SUPABASE_SERVICE_KEY,
              'Authorization': `Bearer ${process.env.SUPABASE_SERVICE_KEY}`,
              'Content-Type': 'application/json',
              'Prefer': 'resolution=merge-duplicates',
            },
            body: JSON.stringify({ id: 1, alerts, fetched_at: new Date().toISOString() }),
          });

          console.log(`Supabase upsert: ${res.status}`);
          if (!res.ok) console.log(await res.text());
          EOF
