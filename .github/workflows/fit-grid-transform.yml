name: Fit Six-Figure Grid Transform

# Joins vicpagers_messages (six-figure refs) with geocode_cache (real lat/lng)
# to refit the affine transform. Prints updated coefficients to the Actions log.
# Run this after collecting more pager data or geocode cache entries.

on:
  workflow_dispatch:

jobs:
  fit:
    runs-on: ubuntu-latest
    steps:
      - name: Fit affine transform from Supabase data
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          node --input-type=module << 'EOF'
          const url = process.env.SUPABASE_URL
          const key = process.env.SUPABASE_SERVICE_KEY
          const hdrs = {
            apikey: key,
            Authorization: `Bearer ${key}`,
          }

          // ── 1. Pull all pager messages that have a M-series six-figure ref + address ──
          const qs = new URLSearchParams({
            select: 'parsed_six_figure,parsed_map_ref,parsed_address',
            'parsed_six_figure': 'not.is.null',
            order: 'received_at.desc',
            limit: '5000',
          })
          const r1 = await fetch(`${url}/rest/v1/vicpagers_messages?${qs}`, { headers: hdrs })
          const msgs = await r1.json()
          console.log(`Fetched ${msgs.length} pager messages with six-figure refs`)

          // Keep only M-series metro Melway refs with clean 6-digit refs and a non-empty address
          const metro = msgs.filter(m => {
            const sf = (m.parsed_six_figure || '').replace(/\s/g, '')
            const mr = (m.parsed_map_ref   || '')
            const addr = (m.parsed_address || '').trim()
            return /^\d{5,6}$/.test(sf) && /^M[\s\d]/.test(mr) && addr.length > 4
          })
          console.log(`M-series with address: ${metro.length}`)

          // Deduplicate by address (keep one per unique address)
          const byAddr = new Map()
          for (const m of metro) {
            const addr = m.parsed_address.trim()
            if (!byAddr.has(addr)) byAddr.set(addr, m)
          }
          console.log(`Unique addresses: ${byAddr.size}`)

          // ── 2. Look up each address in geocode_cache ──
          // Batch in groups of 50 using PostgREST IN filter
          const addrs = [...byAddr.keys()]
          const geoMap = new Map()

          for (let i = 0; i < addrs.length; i += 50) {
            const batch = addrs.slice(i, i + 50)
            const inList = batch.map(a => `"${a.replace(/"/g, '\\"')}"`).join(',')
            const r2 = await fetch(
              `${url}/rest/v1/geocode_cache?select=key,lat,lng&key=in.(${encodeURIComponent(inList)})`,
              { headers: hdrs }
            )
            const rows = await r2.json()
            if (Array.isArray(rows)) for (const row of rows) geoMap.set(row.key, row)
          }
          console.log(`Geocode cache hits: ${geoMap.size}`)

          // ── 3. Build calibration pairs ──
          const pts = []
          for (const [addr, m] of byAddr) {
            const geo = geoMap.get(addr)
            if (!geo || geo.lat == null || geo.lng == null) continue
            const sf = m.parsed_six_figure.replace(/\s/g, '').padStart(6, '0')
            const x = parseInt(sf.slice(0, 3), 10)
            const rawY = parseInt(sf.slice(3), 10)
            const y = rawY > 500 ? rawY - 1000 : rawY
            // Sanity: drop points outside Melbourne metro
            if (geo.lat < -38.6 || geo.lat > -37.4 || geo.lng < 144.4 || geo.lng > 146.0) continue
            pts.push({ x, y, lat: geo.lat, lng: geo.lng, addr })
          }
          console.log(`Calibration pairs after geocode join: ${pts.length}`)

          if (pts.length < 6) {
            console.error('Not enough calibration pairs — run the pager tab to geocode more incidents first')
            process.exit(1)
          }

          // ── 4. Least-squares affine fit ──
          function solve(A, b) {
            const n = A.length, M = A.map((r, i) => [...r, b[i]])
            for (let i = 0; i < n; i++) {
              let max = i
              for (let k = i+1; k < n; k++) if (Math.abs(M[k][i]) > Math.abs(M[max][i])) max = k
              ;[M[i], M[max]] = [M[max], M[i]]
              for (let k = i+1; k < n; k++) {
                const f = M[k][i]/M[i][i]
                for (let j = i; j <= n; j++) M[k][j] -= f*M[i][j]
              }
            }
            const x = new Array(n).fill(0)
            for (let i = n-1; i >= 0; i--) {
              x[i] = M[i][n]/M[i][i]
              for (let k = i-1; k >= 0; k--) M[k][n] -= M[k][i]*x[i]
            }
            return x
          }

          const ATA = [[0,0,0],[0,0,0],[0,0,0]]
          const ATbL = [0,0,0], ATbG = [0,0,0]
          for (const p of pts) {
            const r = [1, p.x, p.y]
            for (let i = 0; i < 3; i++) {
              for (let j = 0; j < 3; j++) ATA[i][j] += r[i]*r[j]
              ATbL[i] += r[i]*p.lat; ATbG[i] += r[i]*p.lng
            }
          }
          const lc = solve(ATA, ATbL), gc = solve(ATA, ATbG)

          // ── 5. Compute residuals ──
          const errs = pts.map(p => {
            const pl = lc[0]+lc[1]*p.x+lc[2]*p.y
            const pg = gc[0]+gc[1]*p.x+gc[2]*p.y
            const km = Math.sqrt(((pl-p.lat)*111)**2+((pg-p.lng)*85.7)**2)
            return { ...p, km }
          }).sort((a, b) => b.km - a.km)

          const rmse = Math.sqrt(errs.reduce((s,p)=>s+p.km**2,0)/errs.length)
          const p50  = errs[Math.floor(errs.length*0.50)].km
          const p90  = errs[Math.floor(errs.length*0.90)].km

          console.log('\n════ RESULTS ════')
          console.log(`n=${pts.length}  RMSE=${rmse.toFixed(3)}km  p50=${p50.toFixed(3)}km  p90=${p90.toFixed(3)}km`)
          console.log('\nWorst 10 residuals:')
          errs.slice(0, 10).forEach(p => {
            console.log(`  ${p.km.toFixed(2)}km  (${p.x},${String(p.y).padStart(4)})  ${p.addr.slice(0,60)}`)
          })

          console.log('\n════ PASTE INTO src/lib/utils.js sixFigureToLatLng() ════')
          console.log(`  const lat = ${lc[0].toFixed(9)} + (${lc[1].toFixed(10)}) * x + ${lc[2].toFixed(10)} * y;`)
          console.log(`  const lng = ${gc[0].toFixed(9)} + ${gc[1].toFixed(10)}  * x + (${gc[2].toFixed(10)}) * y;`)
          console.log('  // n=' + pts.length + '  RMSE=' + rmse.toFixed(3) + 'km  p90=' + p90.toFixed(3) + 'km')
          EOF
